server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        try_files /en.html /en/index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    location = /404.html {
        internal;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff2?|ttf|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
